<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0a1a" />
  <meta name="description" content="Dada Dojo - Daily Goal Tracker for Kids. Track chores, earn points, redeem rewards." />
  <title>Dada Dojo</title>

  <!-- Tailwind via Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: 'var(--card)',
            'card-foreground': 'var(--card-foreground)',
            popover: 'var(--popover)',
            'popover-foreground': 'var(--popover-foreground)',
            primary: 'var(--primary)',
            'primary-foreground': 'var(--primary-foreground)',
            secondary: 'var(--secondary)',
            'secondary-foreground': 'var(--secondary-foreground)',
            muted: 'var(--muted)',
            'muted-foreground': 'var(--muted-foreground)',
            accent: 'var(--accent)',
            'accent-foreground': 'var(--accent-foreground)',
            destructive: 'var(--destructive)',
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)',
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --radius: 0.75rem;
      --background: #0f0a1a;
      --foreground: #f0e6ff;
      --card: #1a1029;
      --card-foreground: #f0e6ff;
      --popover: #1a1029;
      --popover-foreground: #f0e6ff;
      --primary: #a855f7;
      --primary-foreground: #ffffff;
      --secondary: #2d1f45;
      --secondary-foreground: #f0e6ff;
      --muted: #2d1f45;
      --muted-foreground: #a78bfa;
      --accent: #3b2760;
      --accent-foreground: #f0e6ff;
      --destructive: #ef4444;
      --border: #3b2760;
      --input: #3b2760;
      --ring: #a855f7;
    }

    html, body {
      background: var(--background);
      color: var(--foreground);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      min-height: 100vh;
    }

    * { border-color: var(--border); }

    /* Custom scrollbar for dark theme */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1029; }
    ::-webkit-scrollbar-thumb { background: #3b2760; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a855f7; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(80px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    .anim-fade { animation: fadeIn 0.2s ease-out; }
    .anim-scale { animation: scaleIn 0.2s ease-out; }
    .anim-slide-left { animation: slideInLeft 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    .anim-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .anim-toast { animation: toastIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    .anim-bounce { animation: bounce 1s infinite; }

    .gradient-text {
      background: linear-gradient(to right, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Hide native checkbox appearance for our custom Checkbox */
    .dd-checkbox {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .dd-checkbox:checked {
      background: var(--primary);
      border-color: var(--primary);
    }
    .dd-checkbox:checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* Native select styling for dark theme */
    select.dd-input {
      background-color: var(--secondary);
      color: var(--foreground);
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a78bfa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1rem;
      padding-right: 2rem;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    /* Date input dark styling */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(1) saturate(3) hue-rotate(230deg);
      cursor: pointer;
    }

    /* No focus outline but accessible ring */
    button:focus-visible, input:focus-visible, [role="button"]:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    (function () {
      'use strict';

      const { useState, useEffect, useCallback, useMemo, useRef } = React;
      const h = React.createElement;
      const e = React.createElement;

      // ════════════════════════════════════════════════════════════════
      // ICONS — Inline SVG paths (Lucide-derived, MIT)
      // ════════════════════════════════════════════════════════════════
      const ICON_PATHS = {
        home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
        trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
        store: '<m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 2v20h16V2"/><path d="M15 22V17a3 3 0 0 0-3-3h-2a3 3 0 0 0-3 3v5"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/>',
        calendar: '<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
        listChecks: '<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8M13 12h8M13 18h8"/>',
        logOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>',
        plus: '<path d="M5 12h14M12 5v14"/>',
        minus: '<path d="M5 12h14"/>',
        star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
        trash2: '<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
        edit3: '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
        x: '<path d="M18 6 6 18M6 6l12 12"/>',
        check: '<polyline points="20 6 9 17 4 12"/>',
        gift: '<rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/>',
        chevronLeft: '<path d="m15 18-6-6 6-6"/>',
        chevronRight: '<path d="m9 18 6-6-6-6"/>',
        trendingUp: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
        menu: '<line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>',
        user: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
        userPlus: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/>',
        eye: '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
        eyeOff: '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>',
        award: '<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>',
        zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
        settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
        shoppingBag: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
        download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
      };

      function Icon({ name, size = 20, className = '', style = {} }) {
        const path = ICON_PATHS[name];
        if (!path) return null;
        return (
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            className={className}
            style={style}
            dangerouslySetInnerHTML={{ __html: path }}
          />
        );
      }

      // ════════════════════════════════════════════════════════════════
      // UTILITIES
      // ════════════════════════════════════════════════════════════════
      const uid = () => (typeof crypto !== 'undefined' && crypto.randomUUID
        ? crypto.randomUUID()
        : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9));

      const todayStr = () => new Date().toISOString().split('T')[0];

      const cn = (...parts) => parts.filter(Boolean).join(' ');

      // ════════════════════════════════════════════════════════════════
      // STORAGE / DATA LAYER
      // ════════════════════════════════════════════════════════════════
      const STORAGE_KEY = 'dadaDojoData_v1';

      const DEFAULT_DATA = {
        family: null,            // { name, email, createdAt }
        kids: [],
        chores: [],
        choreLogs: [],           // { id, kidId, choreId, points, date, action: 'check'|'uncheck'|'manual', reason }
        storeItems: [],
        listItems: [],
        calendarEvents: [],
        choreChecks: {},         // { 'YYYY-MM-DD': { kidId: { choreId: true } } }
      };

      function loadData() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ...DEFAULT_DATA };
          const parsed = JSON.parse(raw);
          return { ...DEFAULT_DATA, ...parsed };
        } catch (err) {
          console.error('Failed to load data:', err);
          return { ...DEFAULT_DATA };
        }
      }

      function saveData(data) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (err) {
          console.error('Failed to save data:', err);
        }
      }

      // ════════════════════════════════════════════════════════════════
      // TOAST SYSTEM (replaces sonner)
      // ════════════════════════════════════════════════════════════════
      const ToastCtx = React.createContext({ toast: () => {} });

      function ToastProvider({ children }) {
        const [toasts, setToasts] = useState([]);
        const toast = useCallback((message, type = 'info') => {
          const id = uid();
          setToasts(t => [...t, { id, message, type }]);
          setTimeout(() => {
            setToasts(t => t.filter(x => x.id !== id));
          }, 3000);
        }, []);

        const api = useMemo(() => ({
          toast,
          success: (m) => toast(m, 'success'),
          error: (m) => toast(m, 'error'),
          info: (m) => toast(m, 'info'),
        }), [toast]);

        const colors = {
          success: 'border-green-500/40 bg-green-950/80 text-green-200',
          error: 'border-red-500/40 bg-red-950/80 text-red-200',
          info: 'border-primary/40 bg-card/95 text-foreground',
        };

        return (
          <ToastCtx.Provider value={api}>
            {children}
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none">
              {toasts.map(t => (
                <div
                  key={t.id}
                  className={cn(
                    'anim-toast pointer-events-auto px-4 py-2.5 rounded-xl border backdrop-blur-md shadow-lg text-sm font-medium min-w-[200px] max-w-[400px] text-center',
                    colors[t.type] || colors.info
                  )}
                >
                  {t.message}
                </div>
              ))}
            </div>
          </ToastCtx.Provider>
        );
      }

      const useToast = () => React.useContext(ToastCtx);

      // ════════════════════════════════════════════════════════════════
      // UI PRIMITIVES (shadcn-inspired, vanilla React)
      // ════════════════════════════════════════════════════════════════
      function Button({ variant = 'default', size = 'default', className = '', children, ...props }) {
        const variants = {
          default: 'bg-primary text-primary-foreground hover:bg-primary/90 shadow-sm shadow-primary/20',
          outline: 'border border-border bg-transparent hover:bg-secondary/50 text-foreground',
          ghost: 'hover:bg-secondary/50 text-foreground',
          secondary: 'bg-secondary text-secondary-foreground hover:bg-secondary/80',
          destructive: 'bg-destructive text-white hover:bg-destructive/90',
          link: 'text-primary underline-offset-4 hover:underline',
        };
        const sizes = {
          default: 'h-10 px-4 py-2 text-sm',
          sm: 'h-9 px-3 text-sm',
          lg: 'h-11 px-6 text-base',
          icon: 'h-10 w-10',
        };
        return (
          <button
            className={cn(
              'inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-all disabled:opacity-50 disabled:pointer-events-none whitespace-nowrap',
              variants[variant],
              sizes[size],
              className
            )}
            {...props}
          >
            {children}
          </button>
        );
      }

      function Card({ className = '', children, ...props }) {
        return (
          <div
            className={cn('rounded-xl border border-border bg-card text-card-foreground shadow-sm', className)}
            {...props}
          >
            {children}
          </div>
        );
      }
      function CardHeader({ className = '', children }) {
        return <div className={cn('p-6 pb-3', className)}>{children}</div>;
      }
      function CardTitle({ className = '', children }) {
        return <h3 className={cn('font-semibold leading-none tracking-tight', className)}>{children}</h3>;
      }
      function CardContent({ className = '', children }) {
        return <div className={cn('p-6 pt-0', className)}>{children}</div>;
      }

      function Input({ className = '', ...props }) {
        return (
          <input
            className={cn(
              'dd-input flex h-10 w-full rounded-lg border border-input bg-secondary/50 px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground/60 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring transition-colors',
              className
            )}
            {...props}
          />
        );
      }

      function Label({ className = '', children, ...props }) {
        return (
          <label
            className={cn('text-sm font-medium leading-none text-foreground/90', className)}
            {...props}
          >
            {children}
          </label>
        );
      }

      function Badge({ variant = 'default', className = '', children }) {
        const variants = {
          default: 'bg-primary/20 text-primary border-transparent',
          secondary: 'bg-secondary text-secondary-foreground border-transparent',
          outline: 'border border-border text-foreground',
          destructive: 'bg-destructive/20 text-red-300 border-transparent',
        };
        return (
          <span
            className={cn(
              'inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium',
              variants[variant],
              className
            )}
          >
            {children}
          </span>
        );
      }

      function Progress({ value = 0, className = '' }) {
        return (
          <div className={cn('relative h-2 w-full overflow-hidden rounded-full bg-secondary/70', className)}>
            <div
              className="absolute left-0 top-0 bottom-0 bg-gradient-to-r from-purple-500 to-pink-500 transition-all duration-500"
              style={{ width: `${Math.min(Math.max(value, 0), 100)}%` }}
            />
          </div>
        );
      }

      function Switch({ checked, onCheckedChange, disabled = false }) {
        return (
          <button
            type="button"
            role="switch"
            aria-checked={checked}
            disabled={disabled}
            onClick={() => !disabled && onCheckedChange && onCheckedChange(!checked)}
            className={cn(
              'relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed',
              checked ? 'bg-primary' : 'bg-secondary border border-border'
            )}
          >
            <span
              className={cn(
                'inline-block h-5 w-5 transform rounded-full bg-white shadow-md transition-transform',
                checked ? 'translate-x-5' : 'translate-x-0.5'
              )}
            />
          </button>
        );
      }

      function Checkbox({ checked, onCheckedChange, className = '' }) {
        return (
          <input
            type="checkbox"
            className={cn('dd-checkbox', className)}
            checked={!!checked}
            onChange={e => onCheckedChange && onCheckedChange(e.target.checked)}
          />
        );
      }

      function Separator({ className = '' }) {
        return <div className={cn('h-px w-full bg-border', className)} />;
      }

      function ScrollArea({ className = '', children }) {
        return (
          <div className={cn('overflow-y-auto', className)}>
            {children}
          </div>
        );
      }

      function Dialog({ open, onOpenChange, children }) {
        useEffect(() => {
          if (!open) return;
          const onKey = (e) => { if (e.key === 'Escape') onOpenChange && onOpenChange(false); };
          window.addEventListener('keydown', onKey);
          document.body.style.overflow = 'hidden';
          return () => {
            window.removeEventListener('keydown', onKey);
            document.body.style.overflow = '';
          };
        }, [open, onOpenChange]);

        if (!open) return null;
        return (
          <div className="fixed inset-0 z-[90] flex items-center justify-center p-4">
            <div
              className="absolute inset-0 bg-black/70 backdrop-blur-sm anim-fade"
              onClick={() => onOpenChange && onOpenChange(false)}
            />
            <div className="relative z-10 w-full max-w-md anim-scale">
              {children}
            </div>
          </div>
        );
      }
      function DialogContent({ className = '', children }) {
        return (
          <div className={cn('rounded-xl border border-border bg-card shadow-2xl shadow-black/50 p-6', className)}>
            {children}
          </div>
        );
      }
      function DialogHeader({ children }) {
        return <div className="mb-4">{children}</div>;
      }

      // ════════════════════════════════════════════════════════════════
      // GAUGE CHART
      // ════════════════════════════════════════════════════════════════
      function GaugeChart({ value, max, label }) {
        const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
        return (
          <div className="flex flex-col items-center">
            <div className="relative w-40 h-20 overflow-hidden">

                <span className="text-2xl font-bold">{value}</span>
              </div>
            </div>
            <p className="text-xs text-muted-foreground mt-1 text-center">{label}</p>

      }

      // (Continued in next script block — same babel scope via window.__ddPart2)
      window.__ddBootstrap = function (components) {
        const {

        // ════════════════════════════════════════════════════════════════

                if (existing && existing.email === email) {
                  success('Welcome back!');
                  onAuthed(existing);
                } else if (existing) {
                  error('Email does not match this device\'s family account.');
                } else {
                  // First-time login on this device — create on the fly
                  const fam = { name: name || email.split('@')[0] || 'Family', email, createdAt: new Date().toISOString() };
                  const next = { ...data, family: fam };
                  saveData(next);
                  success('Welcome to Dada Dojo!');
                  onAuthed(fam);
                }
              } else {
                if (!name.trim()) {
                  error('Please enter your family name.');
                  setLoading(false);
                  return;

                const fam = { name: name.trim(), email, createdAt: new Date().toISOString() };
                const next = { ...data, family: fam };

                onAuthed(fam);

        // ════════════════════════════════════════════════════════════════

        const TABS = [

        function Home({ family, onSignOut }) {

          const handleInstall = async () => {

          // ── Derived data ────────────────────────────────────────

          const todayLogs = useMemo(() => {
            const t = todayStr();

          }, [data.choreLogs, selectedKidId]);

          // 7-day activity log for selected kid
          const weekLogs = useMemo(() => {
            const sevenAgo = new Date();
            sevenAgo.setDate(sevenAgo.getDate() - 7);
            return data.choreLogs
              .filter(l => l.kidId === selectedKidId && new Date(l.date) >= sevenAgo)
              .sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [data.choreLogs, selectedKidId]);

          const weeklyPoints = () => {
            const days = [];
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            for (let i = 6; i >= 0; i--) {
              const d = new Date(); d.setDate(d.getDate() - i);
              const dayStr = d.toISOString().split('T')[0];
              const dayPts = data.choreLogs
                .filter(l => l.kidId === selectedKidId && l.date.startsWith(dayStr))
                .reduce((sum, l) => sum + l.points, 0);
              days.push({ day: dayNames[d.getDay()], pts: dayPts });
            }
            return days;
          };
          const weekData = weeklyPoints();
          const weekTotal = weekData.reduce((s, d) => s + d.pts, 0);
          const maxChart = Math.max(...weekData.map(d => d.pts), 1);

          // ── Mutators ────────────────────────────────────────────
          const updateKid = (kidId, patch) => {
            setData(d => ({
              ...d,
              kids: d.kids.map(k => k.id === kidId ? { ...k, ...patch } : k),
            }));
          };

          const adjustPoints = (amount, reason) => {
            if (!selectedKidId) return;
            const kid = data.kids.find(k => k.id === selectedKidId);
            if (!kid) return;
            const log = {
              id: uid(),
              kidId: selectedKidId,
              choreId: null,
              points: amount,
              date: new Date().toISOString(),
              action: 'manual',
              reason: reason || 'Manual adjustment',
            };
            setData(d => ({
              ...d,
              kids: d.kids.map(k => k.id === selectedKidId
                ? { ...k, totalPoints: k.totalPoints + amount }
                : k),
              choreLogs: [log, ...d.choreLogs],
            }));
            success(`${amount > 0 ? '+' : ''}${amount} points`);
          };

          const toggleChore = (choreId, checked) => {
            if (!selectedKidId) return;
            const chore = data.chores.find(c => c.id === choreId);
            if (!chore) return;
            const kid = data.kids.find(k => k.id === selectedKidId);
            if (!kid) return;
            const today = todayStr();
            const todayMap = { ...(data.choreChecks[today] || {}) };
            const kidMap = { ...(todayMap[selectedKidId] || {}) };

            if (checked) {
              kidMap[choreId] = true;
              todayMap[selectedKidId] = kidMap;
              const log = {
                id: uid(),
                kidId: selectedKidId,
                choreId,
                points: chore.points,
                date: new Date().toISOString(),
                action: 'check',
                reason: chore.name,
              };
              setData(d => ({
                ...d,
                kids: d.kids.map(k => k.id === selectedKidId
                  ? { ...k, totalPoints: k.totalPoints + chore.points }
                  : k),
                choreChecks: { ...d.choreChecks, [today]: todayMap },
                choreLogs: [log, ...d.choreLogs],
              }));
              success('Goal completed! +' + chore.points + ' points');
            } else {
              delete kidMap[choreId];
              todayMap[selectedKidId] = kidMap;
              const log = {
                id: uid(),
                kidId: selectedKidId,
                choreId,
                points: -chore.points,
                date: new Date().toISOString(),
                action: 'uncheck',
                reason: 'Unchecked: ' + chore.name,
              };
              setData(d => ({
                ...d,
                kids: d.kids.map(k => k.id === selectedKidId
                  ? { ...k, totalPoints: k.totalPoints - chore.points }
                  : k),
                choreChecks: { ...d.choreChecks, [today]: todayMap },
                choreLogs: [log, ...d.choreLogs],
              }));
              info('Goal unchecked');

          const purchaseItem = (storeItemId) => {

            if (kid.totalPoints < item.pointCost) {

              kidId: selectedKidId,
              choreId: null,

              reason: 'Bought: ' + item.name,

            setData(d => ({ ...d, chores: [...d.chores, chore] }));

                  const emoji = f.elements.namedItem('kidEmoji').value.trim();
                  if (!name) return;
                  addKid(name, emoji || '🥋');
                  setDlg({ open: false, type: '' });
                }}
                className="space-y-4"
              >
                <div>
                  <Label>Name</Label>
                  <Input name="kidName" placeholder="Your kid's name" className="bg-secondary/50 mt-1" required />
                </div>
                <div>
                  <Label>Avatar Emoji</Label>
                  <EmojiPicker
                    name="kidEmoji"
                    options={['🥋', '🌟', '🦸', '🐉', '🚀', '🎮', '🎨', '⚽', '🧩', '🎸']}
                    defaultValue="🥋"
                  />
                </div>
                <DialogFooter>
                  <Button type="button" variant="ghost" onClick={() => setDlg({ open: false, type: '' })}>Cancel</Button>
                  <Button type="submit" className="bg-primary hover:bg-primary/90">Add Kid</Button>
                </DialogFooter>
              </form>
            </>
          );

          const ChoreDialog = () => {
            const isEdit = dlg.type === 'editChore';
            return (
              <>
                <DialogHeader><DialogTitle>{isEdit ? 'Edit Goal' : 'Add Goal'}</DialogTitle></DialogHeader>
                <form
                  onSubmit={(ev) => {
                    ev.preventDefault();
                    const f = ev.target;
                    const name = f.elements.namedItem('choreName').value.trim();
                    const icon = f.elements.namedItem('choreIcon').value.trim();
                    const points = parseInt(f.elements.namedItem('chorePoints').value);
                    if (!name) return;
                    if (isEdit) {
                      updateChore(dlg.data.id, { name, icon: icon || '✅', points });
                    } else {
                      addChore(name, icon || '✅', points);
                    }
                    setDlg({ open: false, type: '' });
                  }}
                  className="space-y-4"
                >
                  <div>
                    <Label>Goal Name</Label>
                    <Input name="choreName" defaultValue={dlg.data?.name || ''} placeholder="e.g., Brush Teeth" className="bg-secondary/50 mt-1" required />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <Label>Icon</Label>
                      <div className="mt-1">
                        <EmojiPicker
                          name="choreIcon"
                          options={['✅', '🪥', '🧹', '📖', '🍎', '🛁', '🎯', '💪', '🧠', '🎮', '🎵', '🏃']}
                          defaultValue={dlg.data?.icon || '✅'}
                        />
                      </div>
                    </div>
                    <div>
                      <Label>Points</Label>
                      <Input name="chorePoints" type="number" min="1" defaultValue={dlg.data?.points || 1} className="bg-secondary/50 mt-1" required />
                    </div>
                  </div>
                  <DialogFooter>
                    <Button type="button" variant="ghost" onClick={() => setDlg({ open: false, type: '' })}>Cancel</Button>
                    <Button type="submit" className="bg-primary hover:bg-primary/90">{isEdit ? 'Save' : 'Add Goal'}</Button>
                  </DialogFooter>
                </form>
              </>
            );
          };

          const StoreItemDialog = () => {
            const isEdit = dlg.type === 'editStoreItem';
            return (
              <>
                <DialogHeader><DialogTitle>{isEdit ? 'Edit Prize' : 'Add Prize'}</DialogTitle></DialogHeader>
                <form
                  onSubmit={(ev) => {
                    ev.preventDefault();
                    const f = ev.target;
                    const name = f.elements.namedItem('storeName').value.trim();
                    const desc = f.elements.namedItem('storeDesc').value.trim();
                    const cost = parseInt(f.elements.namedItem('storeCost').value);
                    const icon = f.elements.namedItem('storeIcon').value.trim();
                    if (!name || isNaN(cost)) return;
                    if (isEdit) {
                      updateStoreItem(dlg.data.id, { name, description: desc, pointCost: cost, icon: icon || '🎁' });
                    } else {
                      addStoreItem(name, desc, cost, icon || '🎁');
                    }
                    setDlg({ open: false, type: '' });
                  }}
                  className="space-y-4"
                >
                  <div>
                    <Label>Prize Name</Label>
                    <Input name="storeName" defaultValue={dlg.data?.name || ''} placeholder="e.g., Extra Screen Time" className="bg-secondary/50 mt-1" required />
                  </div>
                  <div>
                    <Label>Description (optional)</Label>
                    <Input name="storeDesc" defaultValue={dlg.data?.description || ''} placeholder="Brief description" className="bg-secondary/50 mt-1" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <Label>Point Cost</Label>
                      <Input name="storeCost" type="number" min="1" defaultValue={dlg.data?.pointCost || 10} className="bg-secondary/50 mt-1" required />
                    </div>
                    <div>
                      <Label>Icon</Label>
                      <div className="mt-1">
                        <EmojiPicker
                          name="storeIcon"
                          options={['🎁', '🎮', '🍫', '🎬', '🏃', '📚', '🎪', '🍦', '🎨', '🌟', '🎸', '🛍️']}
                          defaultValue={dlg.data?.icon || '🎁'}
                        />
                      </div>
                    </div>
                  </div>
                  <DialogFooter>
                    <Button type="button" variant="ghost" onClick={() => setDlg({ open: false, type: '' })}>Cancel</Button>
                    <Button type="submit" className="bg-primary hover:bg-primary/90">{isEdit ? 'Save' : 'Add Prize'}</Button>
                  </DialogFooter>
                </form>
              </>
            );
          };

          const CustomPointsDialog = () => (
            <>
              <DialogHeader><DialogTitle>Adjust Points</DialogTitle></DialogHeader>
              <form
                onSubmit={(ev) => {
                  ev.preventDefault();
                  const f = ev.target;
                  const amount = parseInt(f.elements.namedItem('ptsAmount').value);
                  const reason = f.elements.namedItem('ptsReason').value.trim();
                  if (isNaN(amount)) return;
                  adjustPoints(amount, reason || 'Manual adjustment');
                  setDlg({ open: false, type: '' });
                }}
                className="space-y-4"
              >
                <div>
                  <Label>Amount (positive or negative)</Label>
                  <Input name="ptsAmount" type="number" placeholder="e.g., 5 or -3" className="bg-secondary/50 mt-1" required />
                </div>
                <div>
                  <Label>Reason (optional)</Label>
                  <Input name="ptsReason" placeholder="e.g., Great job at school!" className="bg-secondary/50 mt-1" />
                </div>
                <DialogFooter>
                  <Button type="button" variant="ghost" onClick={() => setDlg({ open: false, type: '' })}>Cancel</Button>
                  <Button type="submit" className="bg-primary hover:bg-primary/90">Apply</Button>
                </DialogFooter>
              </form>
            </>
          );

          const AddEventDialog = () => (
            <>
              <DialogHeader><DialogTitle>Add Event</DialogTitle></DialogHeader>
              <form
                onSubmit={(ev) => {
                  ev.preventDefault();
                  const f = ev.target;
                  const name = f.elements.namedItem('evtName').value.trim();
                  const desc = f.elements.namedItem('evtDesc').value.trim();
                  const startDate = f.elements.namedItem('evtStart').value;
                  const endDate = f.elements.namedItem('evtEnd').value;
                  const allDay = f.elements.namedItem('evtAllDay').checked;
                  if (!name || !startDate || !endDate) return;
                  addEvent(name, desc, startDate, endDate, allDay);
                  setDlg({ open: false, type: '' });
                }}
                className="space-y-4"
              >
                <div>
                  <Label>Event Name</Label>
                  <Input name="evtName" placeholder="e.g., Family Game Night" className="bg-secondary/50 mt-1" required />
                </div>
                <div>
                  <Label>Description (optional)</Label>
                  <Input name="evtDesc" placeholder="Details..." className="bg-secondary/50 mt-1" />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <Label>Start Date</Label>
                    <Input name="evtStart" type="datetime-local" className="bg-secondary/50 mt-1" required />
                  </div>
                  <div>
                    <Label>End Date</Label>
                    <Input name="evtEnd" type="datetime-local" className="bg-secondary/50 mt-1" required />
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <input type="checkbox" id="evtAllDay" name="evtAllDay" className="dd-checkbox" defaultChecked />
                  <Label htmlFor="evtAllDay">All Day Event</Label>
                </div>
                <DialogFooter>
                  <Button type="button" variant="ghost" onClick={() => setDlg({ open: false, type: '' })}>Cancel</Button>
                  <Button type="submit" className="bg-primary hover:bg-primary/90">Add Event</Button>
                </DialogFooter>
              </form>
            </>
          );

          const dialogRenderer = () => {
            if (!dlg.open) return null;
            let content = null;
            if (dlg.type === 'addKid') content = <AddKidDialog />;
            else if (dlg.type === 'addChore' || dlg.type === 'editChore') content = <ChoreDialog />;
            else if (dlg.type === 'addStoreItem' || dlg.type === 'editStoreItem') content = <StoreItemDialog />;
            else if (dlg.type === 'customPoints') content = <CustomPointsDialog />;
            else if (dlg.type === 'addEvent') content = <AddEventDialog />;
            if (!content) return null;
            return (
              <Dialog open={dlg.open} onOpenChange={o => setDlg({ ...dlg, open: o })}>
                <DialogContent>
                  {content}
                </DialogContent>
              </Dialog>
            );
          };

          // ═══════════════════════════════════════════════════════
          // RENDER
          // ═══════════════════════════════════════════════════════
          return (
            <div className="min-h-screen flex bg-background">
              {showInstallBanner && (
                <div className="anim-slide-up fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 z-50 bg-card border border-primary/30 rounded-xl p-4 shadow-lg shadow-primary/10">
                  <div className="flex items-center gap-3">
                    <div className="text-3xl">🥋</div>
                    <div className="flex-1">
                      <p className="font-medium text-sm">Install Dada Dojo</p>
                      <p className="text-xs text-muted-foreground">Add to home screen for the best experience</p>
                    </div>
                    <Button size="sm" onClick={handleInstall} className="bg-primary hover:bg-primary/90 shrink-0">
                      Install
                    </Button>
                    <button onClick={() => setShowInstallBanner(false)} className="text-muted-foreground hover:text-foreground p-1">
                      <Icon name="x" size={16} />
                    </button>
                  </div>
                </div>
              )}

              <aside className="hidden md:flex w-60 flex-col border-r border-border bg-card/50 p-4 shrink-0">
                <div className="flex items-center gap-3 mb-8 px-2">
                  <span className="text-3xl">🥋</span>
                  <h1 className="text-xl font-bold gradient-text">Dada Dojo</h1>
                </div>
                <nav className="flex-1 space-y-1">
                  {TABS.map(item => (
                    <button
                      key={item.id}
                      onClick={() => setTab(item.id)}
                      className={cn(
                        'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm font-medium',
                        tab === item.id
                          ? 'bg-primary/15 text-primary'
                          : 'text-muted-foreground hover:text-foreground hover:bg-secondary/50'
                      )}
                    >
                      <Icon name={item.icon} size={20} />
                      {item.label}
                    </button>
                  ))}
                </nav>
                <div className="border-t border-border pt-4 mt-4">
                  <div className="text-sm text-muted-foreground truncate px-2">{family.name}</div>
                  <button
                    onClick={onSignOut}
                    className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-muted-foreground hover:text-destructive transition-all mt-2"
                  >
                    <Icon name="logOut" size={16} /> Sign Out
                  </button>
                </div>
              </aside>

              <div className="md:hidden fixed top-0 left-0 right-0 z-50 bg-card/95 backdrop-blur-sm border-b border-border px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-2xl">🥋</span>
                  <span className="font-bold text-lg gradient-text">Dada Dojo</span>
                </div>
                <button onClick={() => setMobileNav(!mobileNav)} className="text-foreground p-1">
                  <Icon name={mobileNav ? 'x' : 'menu'} size={24} />
                </button>
              </div>

              {mobileNav && (
                <>
                  <div className="md:hidden fixed inset-0 bg-black/50 z-40 anim-fade" onClick={() => setMobileNav(false)} />
                  <aside className="md:hidden fixed top-0 left-0 bottom-0 w-64 z-50 bg-card border-r border-border p-4 anim-slide-left">
                    <div className="flex items-center gap-3 mb-6 px-2">
                      <span className="text-2xl">🥋</span>
                      <span className="font-bold text-lg">Dada Dojo</span>
                    </div>
                    <nav className="space-y-1">
                      {TABS.map(item => (
                        <button
                          key={item.id}
                          onClick={() => { setTab(item.id); setMobileNav(false); }}
                          className={cn(
                            'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-sm font-medium',
                            tab === item.id ? 'bg-primary/15 text-primary' : 'text-muted-foreground hover:text-foreground'
                          )}
                        >
                          <Icon name={item.icon} size={20} /> {item.label}
                        </button>
                      ))}
                    </nav>
                    <button
                      onClick={onSignOut}
                      className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-muted-foreground hover:text-destructive mt-6"
                    >
                      <Icon name="logOut" size={16} /> Sign Out
                    </button>
                  </aside>
                </>
              )}

              <main className="flex-1 md:p-6 p-4 pt-16 md:pt-6 overflow-y-auto min-h-screen">
                {data.kids.length === 0 && tab !== 'settings' ? (
                  <div className="flex flex-col items-center justify-center min-h-[60vh] text-center">
                    <div className="text-6xl mb-4">🥋</div>
                    <h2 className="text-2xl font-bold mb-2">Welcome to Dada Dojo!</h2>
                    <p className="text-muted-foreground mb-6 max-w-md">
                      Start by adding your first kid. Each child gets their own points, goals, and rewards.
                    </p>
                    <Button onClick={() => setDlg({ open: true, type: 'addKid' })} className="bg-primary hover:bg-primary/90">
                      <Icon name="plus" size={18} /> Add Your First Kid
                    </Button>
                  </div>
                ) : (
                  <>
                    <KidSelector />
                    <div className="mt-6">
                      {tab === 'dashboard' && selectedKid && <DashboardTab />}
                      {tab === 'goals' && selectedKid && <GoalsTab />}
                      {tab === 'points' && selectedKid && <PointsTab />}
                      {tab === 'store' && selectedKid && <StoreTab />}
                      {tab === 'calendar' && <CalendarTab />}
                      {tab === 'lists' && <ListsTab />}
                      {tab === 'settings' && <SettingsTab />}
                    </div>
                  </>
                )}
              </main>

              {dialogRenderer()}
            </div>
          );
        }

        // ════════════════════════════════════════════════════════════════
        // ROOT APP
        // ════════════════════════════════════════════════════════════════
        function App() {
          const [family, setFamily] = useState(() => loadData().family);
          const [bootstrapped, setBootstrapped] = useState(false);

          useEffect(() => { setBootstrapped(true); }, []);

          if (!bootstrapped) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-background">
                <div className="text-4xl anim-bounce">🥋</div>
              </div>
            );
          }

          return (
            <ToastProvider>
              {family
                ? <Home family={family} onSignOut={() => {
                    const data = loadData();
                    saveData({ ...data, family: null });
                    setFamily(null);
                  }} />
                : <AuthForm onAuthed={fam => setFamily(fam)} />
              }
            </ToastProvider>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      };

      // Boot
      if (window.__ddBootstrap) {
        window.__ddBootstrap({
          Icon, Button, Card, CardHeader, CardTitle, CardContent,
          Input, Label, Badge, Progress, Switch, Checkbox, Separator,
          ScrollArea, Dialog, DialogContent, DialogHeader, DialogTitle,
          DialogFooter, GaugeChart, ToastProvider, useToast,
          uid, todayStr, cn, loadData, saveData, DEFAULT_DATA,
        });
      }
    })();
  </script>
</body>
</html>
